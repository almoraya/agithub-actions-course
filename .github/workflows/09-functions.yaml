name: 09-functions

on:
  pull_request:
  workflow_dispatch:

jobs:
  echo1:
    runs-on: ubuntu-latest
    steps:

      - name: Print PR title
        run: |
          echo "PR title is: ${{ github.event.pull_request.title }}"

      - name: Print PR labels
        run: |
          cat << EOF
          ${{ toJSON(github.event.pull_request.labels) }}
          EOF
          
      - name: Bug Step
        if: ${{ !cancelled() && contains(github.event.pull_request.title, 'fix') }}
        run: echo "This PR is a bug fix"

      - name: Sleep for 15 seconds
        run: sleep 15
      - name: Failing Step
        run: exit 1

      - name: I will be skipped
        if: ${{ success() }}
        run: echo "I will print if previous steps have succeeded"
      
      - name: I will execute
        if: ${{ failure() }}
        run: echo "I will print if any previous step has failed"

      - name: I will execute on not cancelled
        if: ${{ !cancelled() }}
        run: echo "I will always print, except when the workflow is cancelled"

      - name: I will execute when cancelled
        if: ${{ cancelled() }}
        run: echo "I will print if the workflow has been cancelled"
        


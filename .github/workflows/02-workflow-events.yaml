name: 02-workflow-events

on:
  push:
  pull_request:
  schedule:
    - cron: '52 16 * * *' # In Germany it will at 17:52 every day
  workflow_dispatch:

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show the trigger
        run: echo "This workflow was triggered by a(n) ${{ github.event_name }} event"

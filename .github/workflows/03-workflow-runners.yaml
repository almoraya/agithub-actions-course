name: 03-workflow-runners

on: push

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: |
          echo "Env var: $RUNNER_OS"
          echo "This job is running on a ${{ runner.os }} runner"
          echo "Full info: $RUNNER_NAME ($RUNNER_ARCH)"

  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Show OS
        shell: bash
        run: |
          echo "Env var: $RUNNER_OS"
          echo "This job is running on a ${{ runner.os }} runner"
          echo "Runner OS: $RUNNER_OS"
  mac-echo:
    runs-on: macos-latest
    steps:
      - name: Show OS
        run: |
          echo "Env var: $RUNNER_OS"
          echo "This job is running on a ${{ runner.os }} runner"
          echo "Full info: $RUNNER_NAME ($RUNNER_ARCH)"
